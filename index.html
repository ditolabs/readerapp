<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ReaderApp">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>ReaderApp</title>
</head>
<body>

<!-- HOME -->
<main id="screen-home">
  <header class="home-header">
    <div class="home-logo">📚 <em>Reader</em>App</div>
    <button class="btn-pwa" id="btn-install">⬇ Install App</button>
  </header>
  <div class="home-body">
    <section>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,.epub">
        <span class="dz-icon">📖</span>
        <h3>Buka PDF atau EPUB</h3>
        <p>Seret file ke sini atau klik untuk memilih</p>
        <div class="badge-row">
          <span class="badge badge-pdf">PDF</span>
          <span class="badge badge-epub">EPUB</span>
        </div>
      </div>
    </section>
    <section>
      <div class="section-head">
        <h2 class="section-title">Terakhir Dibaca</h2>
        <button class="btn-clear-hist" id="btn-clear-all">Hapus Semua</button>
      </div>
      <div style="height:10px"></div>
      <div id="history-list"></div>
    </section>
  </div>
</main>

<!-- PROGRESS -->
<div id="screen-progress" class="reader-hidden">
  <div class="prog-num" id="prog-num">0</div>
  <div class="prog-label" id="prog-label">Memproses…</div>
  <div class="prog-sub"   id="prog-sub">Mohon tunggu</div>
  <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill"></div></div>
  <button class="btn-cancel-prog" id="btn-cancel">Batal</button>
</div>

<!-- ══════════ PDF READER ══════════ -->
<div id="reader-pdf" class="reader-hidden">

  <!-- Back — selalu visible, z-index tertinggi -->
  <button class="pdf-back-fixed" id="pdf-back">← Kembali</button>

  <!-- Toolbar auto-hide -->
  <div class="reader-toolbar" id="pdf-toolbar">
    <div class="toolbar-center">
      <span id="pdf-title" class="toolbar-title"></span>
    </div>
    <div class="toolbar-right">
      <span id="pdf-top-page" class="toolbar-page"></span>
    </div>
  </div>

  <!-- Stage -->
  <div class="reader-stage" id="pdf-stage">
    <div id="pdf-book"></div>
    <div class="tap-zone tap-left"   id="tap-pdf-left"></div>
    <div class="tap-zone tap-right"  id="tap-pdf-right"></div>
    <div class="tap-zone tap-center" id="tap-pdf-center"></div>
  </div>

  <!-- Bottom bar auto-hide -->
  <div class="reader-bottom" id="pdf-bottom">
    <div id="pdf-thumbs"></div>
    <input type="range" class="scrubber" id="pdf-scrubber" min="0" value="0">
    <nav class="nav-row">
      <button class="btn-nav" id="pdf-first">⏮</button>
      <button class="btn-nav" id="pdf-prev">‹</button>
      <span class="page-label" id="pdf-page-label">Hal <strong>1</strong>/1</span>
      <button class="btn-nav" id="pdf-next">›</button>
      <button class="btn-nav" id="pdf-last">⏭</button>
    </nav>
    <!-- Toolbar fitur tambahan -->
    <div class="feat-row">
      <button class="feat-btn" id="pdf-btn-zoom-out" title="Zoom out">🔍-</button>
      <button class="feat-btn" id="pdf-btn-zoom-in"  title="Zoom in">🔍+</button>
      <button class="feat-btn" id="pdf-btn-toc"      title="Daftar Isi">☰</button>
      <button class="feat-btn" id="pdf-btn-grid"     title="Semua Halaman">⊞</button>
      <button class="feat-btn" id="pdf-btn-tts"      title="Text-to-Speech">🔊</button>
    </div>
  </div>

  <!-- TOC Panel -->
  <div class="side-panel reader-hidden" id="pdf-toc-panel">
    <div class="panel-header">
      <h3>Daftar Isi</h3>
      <button class="panel-close" id="pdf-toc-close">✕</button>
    </div>
    <div class="panel-body" id="pdf-toc-list"></div>
  </div>

  <!-- Thumbnail Grid Modal -->
  <div class="grid-modal reader-hidden" id="pdf-grid-modal">
    <div class="grid-modal-header">
      <span>Semua Halaman</span>
      <button class="panel-close" id="pdf-grid-close">✕</button>
    </div>
    <div class="grid-body" id="pdf-grid-body"></div>
  </div>

  <!-- TTS Panel -->
  <div class="tts-panel reader-hidden" id="pdf-tts-panel">
    <div class="tts-info" id="pdf-tts-text">Ketuk ▶ untuk mulai membaca</div>
    <div class="tts-controls">
      <button class="tts-btn" id="pdf-tts-prev">⏮</button>
      <button class="tts-btn tts-play" id="pdf-tts-play">▶</button>
      <button class="tts-btn" id="pdf-tts-next">⏭</button>
      <button class="tts-btn" id="pdf-tts-close">✕</button>
    </div>
  </div>

</div>

<!-- ══════════ EPUB READER ══════════ -->
<div id="reader-epub" class="reader-hidden">

  <div id="epub-top">
    <button class="epub-btn" id="epub-back">← Kembali</button>
    <div id="epub-title-bar">—</div>
    <div class="epub-top-actions">
      <button class="epub-btn" id="epub-btn-toc"      title="Daftar Isi">☰</button>
      <button class="epub-btn" id="epub-btn-tts"      title="TTS">🔊</button>
      <button class="epub-btn" id="btn-epub-settings" title="Pengaturan">⚙</button>
    </div>

    <!-- Settings panel -->
    <div id="epub-settings">
      <div class="setting-row">
        <span class="setting-label">Ukuran Font</span>
        <div class="setting-btns">
          <button class="setting-btn" id="font-sm">A-</button>
          <button class="setting-btn" id="font-lg">A+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Tema</span>
        <div class="setting-btns">
          <button class="theme-btn on" id="theme-sepia" style="background:#faf6ef;border-color:#c8a96e"></button>
          <button class="theme-btn"    id="theme-white" style="background:#ffffff"></button>
          <button class="theme-btn"    id="theme-dark"  style="background:#1a1a2e"></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Spasi Baris</span>
        <div class="setting-btns">
          <button class="setting-btn on" id="lh-normal">Normal</button>
          <button class="setting-btn"    id="lh-wide">Lebar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="epub-area">
    <div id="epub-viewer"></div>

    <!-- TOC Panel -->
    <div class="side-panel reader-hidden" id="epub-toc-panel">
      <div class="panel-header">
        <h3>Daftar Isi</h3>
        <button class="panel-close" id="epub-toc-close">✕</button>
      </div>
      <div class="panel-body" id="epub-toc-list"></div>
    </div>
  </div>

  <div id="epub-bottom">
    <input type="range" class="epub-scrubber" id="epub-scrubber" min="0" max="100" value="0" step="1">
    <nav class="epub-nav">
      <button class="epub-nav-btn" id="epub-prev">‹</button>
      <span class="epub-page-label" id="epub-page-label">—</span>
      <button class="epub-nav-btn" id="epub-next">›</button>
    </nav>
  </div>

  <!-- TTS Panel EPUB -->
  <div class="tts-panel reader-hidden" id="epub-tts-panel">
    <div class="tts-info" id="epub-tts-text">Ketuk ▶ untuk mulai membaca</div>
    <div class="tts-controls">
      <button class="tts-btn" id="epub-tts-prev">⏮</button>
      <button class="tts-btn tts-play" id="epub-tts-play">▶</button>
      <button class="tts-btn" id="epub-tts-next">⏭</button>
      <button class="tts-btn" id="epub-tts-close">✕</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
<script src="pageflip.js"></script>
<script src="foliate.js" onerror="console.info('Foliate tidak tersedia')"></script>
<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ReaderApp">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>ReaderApp</title>
</head>
<body>

<!-- ══════════════════════════════════════
     HOME SCREEN
     ══════════════════════════════════════ -->
<main id="screen-home">
  <header class="home-header">
    <div class="home-logo">📚 <em>Reader</em>App</div>
    <button class="btn-pwa" id="btn-install" aria-label="Install aplikasi">⬇ Install App</button>
  </header>
  <div class="home-body">
    <section>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,.epub" aria-label="Pilih file PDF atau EPUB">
        <span class="dz-icon">📖</span>
        <h3>Buka PDF atau EPUB</h3>
        <p>Seret file ke sini atau klik untuk memilih</p>
        <div class="badge-row">
          <span class="badge badge-pdf">PDF</span>
          <span class="badge badge-epub">EPUB</span>
        </div>
      </div>
    </section>
    <section>
      <div class="section-head">
        <h2 class="section-title">Terakhir Dibaca</h2>
        <button class="btn-clear-hist" id="btn-clear-all">Hapus Semua</button>
      </div>
      <div style="height:10px"></div>
      <div id="history-list"></div>
    </section>
  </div>
</main>

<!-- ══════════════════════════════════════
     PROGRESS SCREEN
     ══════════════════════════════════════ -->
<div id="screen-progress" class="reader-hidden">
  <div class="prog-num" id="prog-num">0</div>
  <div class="prog-label" id="prog-label">Memproses…</div>
  <div class="prog-sub" id="prog-sub">Mohon tunggu</div>
  <div class="prog-bar-bg">
    <div class="prog-bar-fill" id="prog-fill"></div>
  </div>
  <button class="btn-cancel-prog" id="btn-cancel">Batal</button>
</div>

<!-- ══════════════════════════════════════
     PDF READER
     Pola dari DeepSeek: selalu ada di DOM,
     show/hide via class reader-hidden/reader-visible
     ══════════════════════════════════════ -->
<div id="reader-pdf" class="reader-hidden">

  <!-- Tombol back SELALU visible, tidak ikut auto-hide, z-index tertinggi -->
  <button class="pdf-back-fixed" id="pdf-back" title="Kembali ke menu utama">← Kembali</button>

  <!-- Toolbar — auto-hide, tap tengah untuk show -->
  <div class="reader-toolbar" id="pdf-toolbar">
    <div class="toolbar-center">
      <span id="pdf-title" class="toolbar-title"></span>
    </div>
    <div class="toolbar-right">
      <span id="pdf-top-page" class="toolbar-page"></span>
    </div>
  </div>

  <!-- Stage PDF -->
  <div class="reader-stage" id="pdf-stage">
    <div id="pdf-book"></div>

    <!-- Tap zones: kiri=prev, kanan=next, tengah=toggle toolbar -->
    <div class="tap-zone tap-left"   id="tap-pdf-left"></div>
    <div class="tap-zone tap-right"  id="tap-pdf-right"></div>
    <div class="tap-zone tap-center" id="tap-pdf-center"></div>
  </div>

  <!-- Bottom bar — auto-hide -->
  <div class="reader-bottom" id="pdf-bottom">
    <!-- Thumbnails -->
    <div id="pdf-thumbs"></div>
    <!-- Scrubber -->
    <input type="range" class="scrubber" id="pdf-scrubber" min="0" value="0" aria-label="Posisi halaman">
    <!-- Nav -->
    <nav class="nav-row">
      <button class="btn-nav" id="pdf-first" aria-label="Halaman pertama">⏮</button>
      <button class="btn-nav" id="pdf-prev"  aria-label="Sebelumnya">‹</button>
      <span class="page-label" id="pdf-page-label">Hal <strong>1</strong>/1</span>
      <button class="btn-nav" id="pdf-next" aria-label="Berikutnya">›</button>
      <button class="btn-nav" id="pdf-last" aria-label="Halaman terakhir">⏭</button>
    </nav>
  </div>

</div>

<!-- ══════════════════════════════════════
     EPUB READER
     ══════════════════════════════════════ -->
<div id="reader-epub" class="reader-hidden">

  <div id="epub-top">
    <button class="epub-btn" id="epub-back">← Kembali</button>
    <div id="epub-title-bar">—</div>
    <button class="epub-btn" id="btn-epub-settings" aria-expanded="false">⚙</button>

    <!-- Settings panel -->
    <div id="epub-settings">
      <div class="setting-row">
        <span class="setting-label">Ukuran Font</span>
        <div class="setting-btns">
          <button class="setting-btn" id="font-sm">A-</button>
          <button class="setting-btn" id="font-lg">A+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Tema</span>
        <div class="setting-btns">
          <button class="theme-btn on" id="theme-sepia" style="background:#faf6ef;border-color:#c8a96e"></button>
          <button class="theme-btn"    id="theme-white" style="background:#ffffff"></button>
          <button class="theme-btn"    id="theme-dark"  style="background:#1a1a2e"></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Spasi Baris</span>
        <div class="setting-btns">
          <button class="setting-btn on" id="lh-normal">Normal</button>
          <button class="setting-btn"    id="lh-wide">Lebar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="epub-area">
    <div id="epub-viewer"></div>
  </div>

  <div id="epub-bottom">
    <input type="range" class="epub-scrubber" id="epub-scrubber" min="0" max="100" value="0" step="1">
    <nav class="epub-nav">
      <button class="epub-nav-btn" id="epub-prev">‹</button>
      <span class="epub-page-label" id="epub-page-label">—</span>
      <button class="epub-nav-btn" id="epub-next">›</button>
    </nav>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
<script src="pageflip.js"></script>
<script src="foliate.js" onerror="console.info('Foliate tidak tersedia')"></script>
<script src="app.js"></script>
</body>
</html>

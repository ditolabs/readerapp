<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport"/>
<meta content="#0d0d0d" name="theme-color"/>
<meta content="yes" name="mobile-web-app-capable"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="black-translucent" name="apple-mobile-web-app-status-bar-style"/>
<meta content="ReaderApp" name="apple-mobile-web-app-title"/>
<link href="manifest.json" rel="manifest"/>
<title>ReaderApp</title>

<link href="style.css" rel="stylesheet"/></head>
<body>
<!-- ① HOME -->
<div class="screen active" id="screen-home">
<div class="home-header">
<div class="home-logo">📚 <em>Reader</em>App</div>
<button class="btn-pwa" id="btn-install">⬇ Install App</button>
</div>
<div class="home-body">
<div class="drop-zone" id="drop-zone">
<input accept=".pdf,.epub" id="file-input" type="file"/>
<span class="dz-icon">📖</span>
<h3>Buka PDF atau EPUB</h3>
<p>Seret file ke sini atau klik untuk memilih</p>
<div class="badge-row">
<span class="badge badge-pdf">PDF</span>
<span class="badge badge-epub">EPUB</span>
</div>
</div>
<div>
<div class="section-head">
<div class="section-title">Terakhir Dibaca</div>
<button class="btn-clear-hist" id="btn-clear-all">Hapus Semua</button>
</div>
<div style="height:10px"></div>
<div id="history-list"></div>
</div>
</div>
</div>
<!-- ② PROGRESS -->
<div class="screen" id="screen-progress">
<div class="prog-num" id="prog-num">0</div>
<div class="prog-label" id="prog-label">Memproses…</div>
<div class="prog-sub" id="prog-sub">Mohon tunggu</div>
<div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill"></div></div>
<button class="btn-cancel-prog" id="btn-cancel">Batal</button>
</div>
<!-- ③ PDF READER -->
<div class="screen" id="screen-pdf">
<!-- Tombol back selalu tampil, tidak ikut auto-hide -->
<div style="position:absolute;top:10px;left:10px;z-index:200;">
<button class="btn-icon" id="pdf-back" style="background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);" title="Kembali">←</button>
</div>
<div class="top-bar" id="pdf-topbar" style="padding-left:58px;">
<div class="top-title" id="pdf-title">—</div>
<div class="top-page" id="pdf-top-page">1/1</div>
</div>
<div id="pdf-stage"><div id="pdf-book"></div></div>
<div class="bottom-bar" id="pdf-bottombar">
<div id="pdf-thumbs"></div>
<input class="scrubber" id="pdf-scrubber" min="0" type="range" value="0"/>
<div class="nav-row">
<button class="btn-nav" id="pdf-first">⏮</button>
<button class="btn-nav" id="pdf-prev">‹</button>
<div class="page-label" id="pdf-page-label">Hal <strong>1</strong>/1</div>
<button class="btn-nav" id="pdf-next">›</button>
<button class="btn-nav" id="pdf-last">⏭</button>
</div>
</div>
</div>
<!-- ④ EPUB READER -->
<div class="screen" id="screen-epub">
<div id="epub-top">
<button class="epub-btn" id="epub-back">← Kembali</button>
<div id="epub-title-bar">—</div>
<button class="epub-btn" id="btn-epub-settings">⚙</button>
<div id="epub-settings">
<div class="setting-row">
<span class="setting-label">Font</span>
<div class="setting-btns">
<button class="setting-btn" id="font-sm">A-</button>
<button class="setting-btn" id="font-lg">A+</button>
</div>
</div>
<div class="setting-row">
<span class="setting-label">Tema</span>
<div class="setting-btns">
<button class="theme-btn on" id="theme-sepia" style="background:#faf6ef;border-color:#c8a96e"></button>
<button class="theme-btn" id="theme-white" style="background:#ffffff"></button>
<button class="theme-btn" id="theme-dark" style="background:#1a1a2e"></button>
</div>
</div>
<div class="setting-row">
<span class="setting-label">Spasi</span>
<div class="setting-btns">
<button class="setting-btn on" id="lh-normal">Normal</button>
<button class="setting-btn" id="lh-wide">Lebar</button>
</div>
</div>
</div>
</div>
<div id="epub-area"><div id="epub-viewer"></div></div>
<div id="epub-bottom">
<input class="epub-scrubber" id="epub-scrubber" max="100" min="0" step="0.1" type="range" value="0"/>
<div class="epub-nav">
<button class="epub-nav-btn" id="epub-prev">‹</button>
<div class="epub-page-label" id="epub-page-label">—</div>
<button class="epub-nav-btn" id="epub-next">›</button>
</div>
</div>
</div>
<!-- Toast -->
<div id="toast"></div>
<!-- LIBS -->






<script src="app.js"></script></body>
</html>
